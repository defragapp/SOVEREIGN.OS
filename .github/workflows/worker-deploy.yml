# .github/workflows/worker-deploy.yml
# SOVEREIGN.OS — Cloudflare Worker CI/CD
# AI layer: CF Workers AI binding (account-bound, no GEMINI_API_KEY required)
# Triggers: push to main + manual dispatch
# Secrets required in GitHub Actions:
#   CF_API_TOKEN, CF_ACCOUNT_ID
#   STAGING_SUPABASE_URL, STAGING_SUPABASE_ANON_KEY
#   SLACK_WEBHOOK_URL (optional)

name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/switchboard/**'
      - 'wrangler.toml'
      - '.github/workflows/worker-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  WORKER_DIR: workers/switchboard
  NODE_VERSION: '20'

jobs:
  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKER_DIR }}/package-lock.json

      - name: Install deps
        working-directory: ${{ env.WORKER_DIR }}
        run: npm ci

      - name: Type check
        working-directory: ${{ env.WORKER_DIR }}
        run: npm run type-check

      - name: Run tests
        working-directory: ${{ env.WORKER_DIR }}
        run: npm test

  # ── Deploy to Staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKER_DIR }}/package-lock.json

      - name: Install deps
        working-directory: ${{ env.WORKER_DIR }}
        run: npm ci

      - name: Deploy to staging
        working-directory: ${{ env.WORKER_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --env staging

      - name: Smoke test staging
        env:
          STAGING_SUPABASE_URL:      ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: |
          sleep 5
          STATUS=$(curl -sf https://api-staging.sovereign.os/health | jq -r '.status' 2>/dev/null || echo "error")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Staging health check failed (status=$STATUS)"
            exit 1
          fi

      - name: Notify Slack (success)
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text":"✅ SOVEREIGN.OS Switchboard deployed to *staging* — commit `${{ github.sha }}`"}'

      - name: Notify Slack (failure)
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text":"❌ SOVEREIGN.OS Switchboard *staging* deploy FAILED — commit `${{ github.sha }}`"}'

  # ── Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production-gate   # requires reviewer approval in GitHub UI
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKER_DIR }}/package-lock.json

      - name: Install deps
        working-directory: ${{ env.WORKER_DIR }}
        run: npm ci

      - name: Deploy to production
        working-directory: ${{ env.WORKER_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --env production

      - name: Health check production
        run: |
          sleep 8
          STATUS=$(curl -sf https://api.sovereign.os/health | jq -r '.status' 2>/dev/null || echo "error")
          echo "Production health status: $STATUS"
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Production health check failed (status=$STATUS)"
            exit 1
          fi

      - name: Notify Slack (production deployed)
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          EMOJI=${{ job.status == 'success' && '🚀' || '🔥' }}
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"${EMOJI} SOVEREIGN.OS Switchboard *production* deploy ${{ job.status }} — commit \`${{ github.sha }}\`\"}"
