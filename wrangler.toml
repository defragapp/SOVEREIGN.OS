# wrangler.toml — Sovereign AI Switchboard
# Cloudflare Worker configuration for api.sovereign.os
# Secrets are NEVER stored here — use: wrangler secret put <KEY> --env <env>

name = "sovereign-switchboard"
main = "workers/switchboard/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Observability ────────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ─── Build ────────────────────────────────────────────────────────────────────
[build]
command = "cd workers/switchboard && npm install && npm run type-check"

# ─── Limits ───────────────────────────────────────────────────────────────────
[limits]
cpu_ms = 50

# ─── Default (local dev) environment ─────────────────────────────────────────
[vars]
ENVIRONMENT = "development"

# ─── Staging environment ──────────────────────────────────────────────────────
[env.staging]
name = "sovereign-switchboard-staging"
route = { pattern = "api-staging.sovereign.os/*", zone_name = "sovereign.os" }
vars = { ENVIRONMENT = "staging" }

# Staging secrets (set with: wrangler secret put <KEY> --env staging):
#   GEMINI_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   FOUNDRY_API_URL
#   FOUNDRY_API_KEY
#   WORKER_HMAC_SECRET
#   SENTRY_DSN
#   DATADOG_API_KEY

# ─── Production environment ───────────────────────────────────────────────────
[env.production]
name = "sovereign-switchboard-production"
route = { pattern = "api.sovereign.os/*", zone_name = "sovereign.os" }
vars = { ENVIRONMENT = "production" }

# Production secrets (set with: wrangler secret put <KEY> --env production):
#   GEMINI_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   FOUNDRY_API_URL
#   FOUNDRY_API_KEY
#   WORKER_HMAC_SECRET
#   SENTRY_DSN
#   DATADOG_API_KEY
