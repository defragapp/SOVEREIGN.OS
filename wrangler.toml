# wrangler.toml — SOVEREIGN.OS Switchboard
# AI layer: Cloudflare Workers AI (account-bound, no external key required)
# Secrets required (5 per env, set via: wrangler secret put <NAME> --env <staging|production>):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   WORKER_HMAC_SECRET   ← generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#   FOUNDRY_API_URL
#   FOUNDRY_API_KEY
# GEMINI_API_KEY is no longer required — AI runs via the [ai] Workers AI binding below.

name              = "sovereign-switchboard"
main              = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── Cloudflare Workers AI binding ─────────────────────────────────────────────
# Provides env.AI inside the Worker — zero config, no API key, account-scoped.
# Free tier: 10,000 neurons/day (resets 00:00 UTC). Paid: $0.011/1K neurons.
[ai]
binding = "AI"

# ── Staging environment ────────────────────────────────────────────────────────
[env.staging]
name = "sovereign-switchboard-staging"

[[env.staging.routes]]
pattern   = "api-staging.sovereign.os/*"
zone_name = "sovereign.os"

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name = "sovereign-switchboard-production"

[[env.production.routes]]
pattern   = "api.sovereign.os/*"
zone_name = "sovereign.os"
